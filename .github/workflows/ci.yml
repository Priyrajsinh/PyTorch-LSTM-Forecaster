name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with black
        run: python -m black --check src/ tests/

      - name: Lint with flake8
        run: python -m flake8 src/ tests/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Sort imports check
        run: python -m isort --check-only src/ tests/ --profile black

      - name: Security audit with bandit
        run: python -m bandit -r src/ -ll -ii

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=src --cov-fail-under=70

      - name: pip-audit
        run: python -m pip_audit -r requirements.txt
